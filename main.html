<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Speed Controller</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="player">
<video
       class="player_video"
       width="765"
       height="430"
       src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>
<div class="player-controls">
<div class="progress">
<div class="progress_filled"></div>
</div>
<button class="player_button">►</button>
<input
           type="range"
           class="volume"
           name="volume"
           min="0"
           max="1"
           step="0.05"
           value="1">
<input
           type="range"
           class="playbackSpeed"
           name="playbackRate"
           min="0.5"
           max="2"
           step="0.1"
           value="1">
<button class="rewind"><< 10s</button>
<button class="skip">25s >></button>
</div>
</div>
<script src="scripts.js"></script>
</body>
</html>
